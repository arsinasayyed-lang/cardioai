<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CardioAI – Heart Disease Identifier</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --dark-pink: #8B1A4A;
      --header-bg: #7D1442;
      --light-pink: #FFE4EE;
      --mid-pink: #F9C6D8;
      --accent: #C2185B;
      --user-bubble: #C2185B;
      --bot-bubble: #fff;
      --text-dark: #2C0A1A;
      --text-muted: #7a4060;
      --shadow: 0 8px 32px rgba(139,26,74,0.15);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--light-pink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ─── HEADER ─── */
    header {
      background: var(--header-bg);
      padding: 18px 32px;
      display: flex;
      align-items: center;
      gap: 14px;
      box-shadow: 0 4px 20px rgba(125,20,66,0.4);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo-icon {
      width: 44px; height: 44px;
      background: rgba(255,255,255,0.15);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px;
    }
    header h1 {
      font-family: 'Playfair Display', serif;
      color: #fff;
      font-size: 1.7rem;
      letter-spacing: 0.5px;
    }
    header h1 span { color: #FFB3CC; }
    .header-tagline {
      margin-left: auto;
      color: rgba(255,255,255,0.65);
      font-size: 0.78rem;
      text-align: right;
      line-height: 1.4;
    }

    /* ─── MAIN LAYOUT ─── */
    main {
      flex: 1;
      display: flex;
      justify-content: center;
      padding: 24px 16px 32px;
    }

    .chat-wrapper {
      width: 100%;
      max-width: 720px;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    /* ─── CHAT BOX ─── */
    .chat-box {
      background: var(--light-pink);
      border-radius: 24px 24px 0 0;
      border: 1.5px solid var(--mid-pink);
      overflow: hidden;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
    }

    .chat-messages {
      height: 520px;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      background: var(--light-pink);
      scroll-behavior: smooth;
    }
    .chat-messages::-webkit-scrollbar { width: 5px; }
    .chat-messages::-webkit-scrollbar-thumb { background: var(--mid-pink); border-radius: 10px; }

    /* ─── BUBBLES ─── */
    .msg { display: flex; gap: 10px; animation: fadeUp 0.3s ease; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .msg.user { flex-direction: row-reverse; }

    .avatar {
      width: 36px; height: 36px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
    }
    .bot .avatar { background: var(--dark-pink); color: #fff; }
    .user .avatar { background: var(--user-bubble); color: #fff; }

    .bubble {
      max-width: 75%;
      padding: 13px 18px;
      border-radius: 18px;
      font-size: 0.92rem;
      line-height: 1.6;
    }
    .bot .bubble {
      background: var(--bot-bubble);
      color: var(--text-dark);
      border-bottom-left-radius: 4px;
      box-shadow: 0 2px 10px rgba(139,26,74,0.08);
    }
    .user .bubble {
      background: var(--user-bubble);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    /* ─── TYPING INDICATOR ─── */
    .typing { display: flex; gap: 5px; padding: 13px 18px; }
    .typing span {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--accent);
      animation: bounce 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%,60%,100% { transform: translateY(0); }
      30% { transform: translateY(-8px); }
    }

    /* ─── RESULT CARD ─── */
    .result-card {
      background: linear-gradient(135deg, #fff 60%, #FFE4EE);
      border: 1.5px solid var(--mid-pink);
      border-radius: 16px;
      padding: 20px;
      margin-top: 6px;
    }
    .result-card h3 {
      font-family: 'Playfair Display', serif;
      color: var(--dark-pink);
      font-size: 1.1rem;
      margin-bottom: 12px;
    }
    .result-row { display: flex; justify-content: space-between; margin-bottom: 8px; }
    .result-label { color: var(--text-muted); font-size: 0.85rem; }
    .result-value { font-weight: 500; color: var(--text-dark); font-size: 0.9rem; }
    .risk-bar-wrap { margin-top: 14px; }
    .risk-bar-label { display: flex; justify-content: space-between; font-size: 0.82rem; margin-bottom: 6px; }
    .risk-bar-label span:first-child { color: var(--text-muted); }
    .risk-pct { font-weight: 600; font-size: 1rem; }
    .risk-bar-bg {
      background: var(--mid-pink);
      border-radius: 99px;
      height: 10px;
      overflow: hidden;
    }
    .risk-bar-fill {
      height: 100%;
      border-radius: 99px;
      transition: width 1.2s cubic-bezier(.4,0,.2,1);
    }
    .risk-low  { background: #4CAF50; }
    .risk-mid  { background: #FF9800; }
    .risk-high { background: #E53935; }
    .risk-badge {
      display: inline-block;
      padding: 3px 12px;
      border-radius: 99px;
      font-size: 0.78rem;
      font-weight: 600;
      margin-top: 10px;
    }
    .badge-low  { background: #E8F5E9; color: #2E7D32; }
    .badge-mid  { background: #FFF3E0; color: #E65100; }
    .badge-high { background: #FFEBEE; color: #B71C1C; }

    /* ─── OPTIONS BUTTONS ─── */
    .options { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 4px; }
    .opt-btn {
      background: #fff;
      border: 1.5px solid var(--accent);
      color: var(--accent);
      border-radius: 99px;
      padding: 7px 16px;
      font-size: 0.84rem;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'DM Sans', sans-serif;
    }
    .opt-btn:hover { background: var(--accent); color: #fff; }

    /* ─── INPUT AREA ─── */
    .input-area {
      background: #fff;
      border-top: 1.5px solid var(--mid-pink);
      padding: 14px 18px;
      display: flex;
      gap: 10px;
      align-items: center;
      border-radius: 0 0 24px 24px;
    }
    .input-area input {
      flex: 1;
      border: 1.5px solid var(--mid-pink);
      border-radius: 99px;
      padding: 10px 18px;
      font-size: 0.9rem;
      font-family: 'DM Sans', sans-serif;
      outline: none;
      color: var(--text-dark);
      background: var(--light-pink);
    }
    .input-area input:focus { border-color: var(--accent); }
    .send-btn {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: var(--dark-pink);
      border: none;
      color: #fff;
      font-size: 20px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, transform 0.15s;
    }
    .send-btn:hover { background: var(--accent); transform: scale(1.07); }

    .restart-btn {
      margin-top: 16px;
      width: 100%;
      background: var(--dark-pink);
      color: #fff;
      border: none;
      border-radius: 99px;
      padding: 12px;
      font-size: 0.9rem;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: background 0.2s;
    }
    .restart-btn:hover { background: var(--accent); }

    /* ─── DISCLAIMER ─── */
    .disclaimer {
      text-align: center;
      font-size: 0.72rem;
      color: var(--text-muted);
      padding: 10px;
      opacity: 0.7;
    }
  </style>
</head>
<body>

<header>
  <div class="logo-icon">🫀</div>
  <h1>Cardio<span>AI</span></h1>
  <div class="header-tagline">AI-Powered Heart Disease<br>Risk Assessment</div>
</header>

<main>
  <div class="chat-wrapper">
    <div class="chat-box">
      <div class="chat-messages" id="chatMessages"></div>
      <div class="input-area">
        <input type="text" id="userInput" placeholder="Type your answer…" autocomplete="off"/>
        <button class="send-btn" onclick="sendMessage()" title="Send">➤</button>
      </div>
    </div>
    <div class="disclaimer">⚠️ CardioAI is for educational purposes only. Always consult a qualified medical professional for diagnosis and treatment.</div>
  </div>
</main>

<script>
  const API_BASE = 'http://localhost:5000';

  // ─── QUESTIONS ───
  const questions = [
    { id: 'age',       text: '👋 Welcome to <strong>CardioAI</strong>! I\'ll assess your heart disease risk in 8 quick questions.<br><br>First — what is your <strong>age</strong>?',           type: 'number', placeholder: 'e.g. 45' },
    { id: 'sex',       text: '🧬 What is your <strong>biological sex</strong>?',                                                                                                          type: 'options', options: ['Male', 'Female'] },
    { id: 'cp',        text: '💔 Do you experience any <strong>chest pain</strong>? If yes, what type?',                                                                                  type: 'options', options: ['No chest pain', 'Typical Angina', 'Atypical Angina', 'Non-anginal Pain'] },
    { id: 'trestbps',  text: '🩺 What is your <strong>resting blood pressure</strong> (in mm Hg)?<br><small style="color:#7a4060">Normal is around 120 mm Hg</small>',                   type: 'number', placeholder: 'e.g. 130' },
    { id: 'chol',      text: '🧪 What is your <strong>serum cholesterol</strong> level (mg/dL)?<br><small style="color:#7a4060">Normal is below 200 mg/dL</small>',                       type: 'number', placeholder: 'e.g. 240' },
    { id: 'thalach',   text: '💓 What is your <strong>maximum heart rate achieved</strong> during exercise?<br><small style="color:#7a4060">Typical range: 100–200 bpm</small>',           type: 'number', placeholder: 'e.g. 150' },
    { id: 'exang',     text: '🏃 Do you experience <strong>chest pain induced by exercise</strong> (exercise angina)?',                                                                   type: 'options', options: ['Yes', 'No'] },
    { id: 'oldpeak',   text: '📈 On your last ECG/stress test, was there any <strong>ST depression</strong>? Enter the value (0 if unknown).<br><small style="color:#7a4060">This is a measure from your ECG report</small>', type: 'number', placeholder: 'e.g. 1.5 or 0' },
  ];

  let currentQ = 0;
  let answers  = {};

  // ─── HELPERS ───
  function scrollBottom() {
    const el = document.getElementById('chatMessages');
    el.scrollTop = el.scrollHeight;
  }

  function addBotMsg(html, extra = '') {
    const el = document.getElementById('chatMessages');
    el.innerHTML += `
      <div class="msg bot">
        <div class="avatar">🤖</div>
        <div>
          <div class="bubble">${html}</div>
          ${extra}
        </div>
      </div>`;
    scrollBottom();
  }

  function addUserMsg(text) {
    const el = document.getElementById('chatMessages');
    el.innerHTML += `
      <div class="msg user">
        <div class="avatar">👤</div>
        <div class="bubble">${text}</div>
      </div>`;
    scrollBottom();
  }

  function addTyping() {
    const el = document.getElementById('chatMessages');
    el.innerHTML += `
      <div class="msg bot" id="typingMsg">
        <div class="avatar">🤖</div>
        <div class="bubble typing"><span></span><span></span><span></span></div>
      </div>`;
    scrollBottom();
  }

  function removeTyping() {
    const t = document.getElementById('typingMsg');
    if (t) t.remove();
  }

  function buildOptions(opts) {
    return `<div class="options">${opts.map(o =>
      `<button class="opt-btn" onclick="chooseOption('${o}')">${o}</button>`
    ).join('')}</div>`;
  }

  function setInputDisabled(dis) {
    document.getElementById('userInput').disabled = dis;
    document.getElementById('userInput').placeholder = dis ? 'Use buttons above ↑' : 'Type your answer…';
  }

  // ─── FLOW ───
  function askQuestion(idx) {
    if (idx >= questions.length) { submitAnswers(); return; }
    const q = questions[idx];
    const extra = q.type === 'options' ? buildOptions(q.options) : '';
    if (q.type === 'options') setInputDisabled(true);
    else { setInputDisabled(false); document.getElementById('userInput').placeholder = q.placeholder || 'Type your answer…'; }
    setTimeout(() => addBotMsg(q.text, extra), 300);
  }

  function chooseOption(val) {
    // Remove option buttons
    document.querySelectorAll('.opt-btn').forEach(b => b.disabled = true);
    addUserMsg(val);
    recordAnswer(questions[currentQ].id, val);
  }

  function sendMessage() {
    const inp = document.getElementById('userInput');
    const val = inp.value.trim();
    if (!val) return;
    inp.value = '';
    if (currentQ >= questions.length) return;
    const q = questions[currentQ];
    if (q.type === 'number') {
      if (isNaN(parseFloat(val))) { addBotMsg('⚠️ Please enter a valid number.'); return; }
    }
    addUserMsg(val);
    recordAnswer(q.id, val);
  }

  function recordAnswer(key, val) {
    answers[key] = val;
    currentQ++;
    if (currentQ < questions.length) {
      addTyping();
      setTimeout(() => { removeTyping(); askQuestion(currentQ); }, 900);
    } else {
      addTyping();
      setTimeout(() => { removeTyping(); submitAnswers(); }, 1200);
    }
  }

  // ─── SUBMIT TO BACKEND ───
  async function submitAnswers() {
    addBotMsg('🔬 Analyzing your responses… hold on.');
    addTyping();

    // Map answers to numeric
    const payload = {
      age:      parseFloat(answers.age),
      sex:      answers.sex === 'Male' ? 1 : 0,
      cp:       ['No chest pain','Typical Angina','Atypical Angina','Non-anginal Pain'].indexOf(answers.cp),
      trestbps: parseFloat(answers.trestbps),
      chol:     parseFloat(answers.chol),
      thalach:  parseFloat(answers.thalach),
      exang:    answers.exang === 'Yes' ? 1 : 0,
      oldpeak:  parseFloat(answers.oldpeak)
    };

    try {
      const res  = await fetch(`${API_BASE}/predict`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      const data = await res.json();
      removeTyping();
      showResult(data);
    } catch (e) {
      removeTyping();
      // Fallback: local rule-based estimate
      const localResult = localPredict(payload);
      showResult(localResult);
    }
  }

  // ─── LOCAL FALLBACK PREDICTION (rule-based) ───
  function localPredict(p) {
    let score = 0;
    if (p.age > 55) score += 20;
    else if (p.age > 45) score += 12;
    if (p.sex === 1) score += 8;
    if (p.cp > 0) score += [0,10,7,5][p.cp];
    if (p.trestbps > 140) score += 12;
    else if (p.trestbps > 120) score += 6;
    if (p.chol > 240) score += 12;
    else if (p.chol > 200) score += 6;
    if (p.thalach < 120) score += 15;
    else if (p.thalach < 150) score += 7;
    if (p.exang === 1) score += 15;
    if (p.oldpeak > 2) score += 10;
    else if (p.oldpeak > 0.5) score += 5;

    const risk_pct = Math.min(score, 95);
    let disease_type = 'No significant heart disease detected';
    if (risk_pct > 70)      disease_type = 'Coronary Artery Disease (CAD) — High probability';
    else if (risk_pct > 50) disease_type = 'Angina / Ischemic Heart Disease — Moderate probability';
    else if (risk_pct > 30) disease_type = 'Early-stage cardiac risk — Low-moderate probability';

    return { risk_percentage: risk_pct, disease_type, risk_level: risk_pct > 60 ? 'High' : risk_pct > 35 ? 'Moderate' : 'Low' };
  }

  // ─── SHOW RESULT ───
  function showResult(data) {
    const pct       = Math.round(data.risk_percentage);
    const disease   = data.disease_type;
    const level     = data.risk_level; // Low / Moderate / High
    const barClass  = level === 'High' ? 'risk-high' : level === 'Moderate' ? 'risk-mid' : 'risk-low';
    const badgeClass= level === 'High' ? 'badge-high': level === 'Moderate' ? 'badge-mid' : 'badge-low';
    const emoji     = level === 'High' ? '🚨' : level === 'Moderate' ? '⚠️' : '✅';

    const card = `
      <div class="result-card">
        <h3>🫀 CardioAI Assessment Result</h3>
        <div class="result-row">
          <span class="result-label">Detected Condition</span>
          <span class="result-value">${disease}</span>
        </div>
        <div class="risk-bar-wrap">
          <div class="risk-bar-label">
            <span>Heart Disease Risk</span>
            <span class="risk-pct" style="color:${level==='High'?'#E53935':level==='Moderate'?'#FF9800':'#4CAF50'}">${pct}%</span>
          </div>
          <div class="risk-bar-bg">
            <div class="risk-bar-fill ${barClass}" id="riskFill" style="width:0%"></div>
          </div>
          <span class="risk-badge ${badgeClass}">${emoji} ${level} Risk</span>
        </div>
      </div>`;

    addBotMsg(`Here is your <strong>CardioAI Report</strong>:`, card);

    setTimeout(() => {
      const fill = document.getElementById('riskFill');
      if (fill) fill.style.width = pct + '%';
    }, 200);

    const advice = level === 'High'
      ? '🚨 <strong>Please consult a cardiologist immediately.</strong> Your responses indicate significant cardiac risk factors.'
      : level === 'Moderate'
      ? '⚠️ Consider scheduling a cardiovascular check-up. Lifestyle changes and monitoring are recommended.'
      : '✅ Your responses suggest a lower cardiac risk. Maintain a healthy lifestyle and get regular check-ups.';

    setTimeout(() => {
      addBotMsg(advice);
      addBotMsg('Would you like to start a new assessment?',
        `<div class="options"><button class="opt-btn" onclick="restartChat()">🔄 Restart Assessment</button></div>`);
      setInputDisabled(true);
    }, 800);
  }

  function restartChat() {
    currentQ = 0;
    answers  = {};
    document.getElementById('chatMessages').innerHTML = '';
    setInputDisabled(false);
    askQuestion(0);
  }

  // ─── ENTER KEY ───
  document.getElementById('userInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') sendMessage();
  });

  // ─── INIT ───
  askQuestion(0);
</script>
</body>

      border-bottom-right-radius: 4px;
    }

    /* ─── TYPING INDICATOR ─── */
    .typing { display: flex; gap: 5px; padding: 13px 18px; }
    .typing span {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--accent);
      animation: bounce 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%,60%,100% { transform: translateY(0); }
      30% { transform: translateY(-8px); }
    }

    /* ─── RESULT CARD ─── */
    .result-card {
      background: linear-gradient(135deg, #fff 60%, #FFE4EE);
      border: 1.5px solid var(--mid-pink);
      border-radius: 16px;
      padding: 20px;
      margin-top: 6px;
    }
    .result-card h3 {
      font-family: 'Playfair Display', serif;
      color: var(--dark-pink);
      font-size: 1.1rem;
      margin-bottom: 12px;
    }
    .result-row { display: flex; justify-content: space-between; margin-bottom: 8px; }
    .result-label { color: var(--text-muted); font-size: 0.85rem; }
    .result-value { font-weight: 500; color: var(--text-dark); font-size: 0.9rem; }
    .risk-bar-wrap { margin-top: 14px; }
    .risk-bar-label { display: flex; justify-content: space-between; font-size: 0.82rem; margin-bottom: 6px; }
    .risk-bar-label span:first-child { color: var(--text-muted); }
    .risk-pct { font-weight: 600; font-size: 1rem; }
    .risk-bar-bg {
      background: var(--mid-pink);
      border-radius: 99px;
      height: 10px;
      overflow: hidden;
    }
    .risk-bar-fill {
      height: 100%;
      border-radius: 99px;
      transition: width 1.2s cubic-bezier(.4,0,.2,1);
    }
    .risk-low  { background: #4CAF50; }
    .risk-mid  { background: #FF9800; }
    .risk-high { background: #E53935; }
    .risk-badge {
      display: inline-block;
      padding: 3px 12px;
      border-radius: 99px;
      font-size: 0.78rem;
      font-weight: 600;
      margin-top: 10px;
    }
    .badge-low  { background: #E8F5E9; color: #2E7D32; }
    .badge-mid  { background: #FFF3E0; color: #E65100; }
    .badge-high { background: #FFEBEE; color: #B71C1C; }

    /* ─── OPTIONS BUTTONS ─── */
    .options { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 4px; }
    .opt-btn {
      background: #fff;
      border: 1.5px solid var(--accent);
      color: var(--accent);
      border-radius: 99px;
      padding: 7px 16px;
      font-size: 0.84rem;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'DM Sans', sans-serif;
    }
    .opt-btn:hover { background: var(--accent); color: #fff; }

    /* ─── INPUT AREA ─── */
    .input-area {
      background: #fff;
      border-top: 1.5px solid var(--mid-pink);
      padding: 14px 18px;
      display: flex;
      gap: 10px;
      align-items: center;
      border-radius: 0 0 24px 24px;
    }
    .input-area input {
      flex: 1;
      border: 1.5px solid var(--mid-pink);
      border-radius: 99px;
      padding: 10px 18px;
      font-size: 0.9rem;
      font-family: 'DM Sans', sans-serif;
      outline: none;
      color: var(--text-dark);
      background: var(--light-pink);
    }
    .input-area input:focus { border-color: var(--accent); }
    .send-btn {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: var(--dark-pink);
      border: none;
      color: #fff;
      font-size: 20px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, transform 0.15s;
    }
    .send-btn:hover { background: var(--accent); transform: scale(1.07); }

    .restart-btn {
      margin-top: 16px;
      width: 100%;
      background: var(--dark-pink);
      color: #fff;
      border: none;
      border-radius: 99px;
      padding: 12px;
      font-size: 0.9rem;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: background 0.2s;
    }
    .restart-btn:hover { background: var(--accent); }

    /* ─── DISCLAIMER ─── */
    .disclaimer {
      text-align: center;
      font-size: 0.72rem;
      color: var(--text-muted);
      padding: 10px;
      opacity: 0.7;
    }
  </style>
</head>
</script>
</body>
</html>
